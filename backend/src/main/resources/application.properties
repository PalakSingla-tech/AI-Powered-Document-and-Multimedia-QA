spring.application.name=AI-Powered-Document-Multimedia-Q-A

spring.datasource.url=jdbc:mysql://localhost:3306/your-db-name
spring.datasource.username=root
spring.datasource.password=your-password

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show_sql=true
spring.jpa.properties.hibernate.format_sql=true

jwt.secretKey=your-secret-key

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

deepgram.api.key=your-api-key
groq.api.key=your-api-key

